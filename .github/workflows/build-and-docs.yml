      #     lake exe mk_all --lib FormalConjectures || true
      #     grep -v "FormalConjectures\.Util\." FormalConjectures.lean > FormalConjectures/All.lean

      # - name: Restore ~/.cache/mathlib
      #   uses: actions/cache/restore@v3
      #   with:
      #     path: ~/.cache/mathlib
      #     key: oleans-${{ hashFiles('lake-manifest.json') }}-${{ hashFiles('**/*.lean') }}
      #     restore-keys: |
      #       oleans-${{ hashFiles('lake-manifest.json') }}-
      #       oleans-

      # - name: Get olean cache
      #   run: |
      #     lake exe cache unpack
      #     lake exe cache get

      # - name: Build project
      #   run: |
      #     lake build

      # - name: Pack olean cache
      #   run: |
      #     lake exe cache pack
      #     ls ~/.cache/mathlib

      # - name: Save ~/.cache/mathlib
      #   uses: actions/cache/save@v3
      #   with:
      #     path: ~/.cache
      #     key: oleans-${{ hashFiles('lake-manifest.json') }}-${{ hashFiles('**/*.lean') }}

      - name: Build website
        run: |
          cd site
          node build.js
        env:
          BASE_PATH: /formal-conjectures

      - name: Upload deploy artifact
        id: deployment
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/site

  # Deployment job
  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
