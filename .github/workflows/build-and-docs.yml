name: Build Lean project and deploy docs

on:
  push:
    branches:
      - main
  pull_request:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build project
    steps:

      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # NOTE: Lean build and extract_names are disabled for now.
      # conjectures.json is committed directly to site/data/.
      # To regenerate: lake build && lake exe extract_names > site/data/conjectures.json

      # - name: Install elan
